<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Detail - REPFIND</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- HEADER -->
<header class="header" id="header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="13" stroke="#b0f54e" stroke-width="2"/>
        <path d="M8 14l4 4 8-8" stroke="#b0f54e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>REPFIND</span>
    </a>
    <div class="search-wrap">
      <div class="search-box">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" placeholder="Search products, shops...">
        <button class="camera-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
      <button class="currency-btn">$ USD</button>
      <a href="admin/index.html" class="btn-primary">Admin</a>
      <button class="btn-primary">Log in</button>
    </div>
  </div>
  <nav class="cat-nav">
    <div class="cat-nav-inner">
      <button class="cat-btn" onclick="location.href='index.html'">All</button>
      <button class="cat-btn">👟 Sneakers</button>
      <button class="cat-btn">👕 Tops</button>
      <button class="cat-btn">🧥 Sweaters</button>
      <button class="cat-btn">🧤 Outerwear</button>
      <button class="cat-btn">👖 Pants</button>
      <button class="cat-btn">👜 Bags</button>
      <button class="cat-btn">⌚ Accessories</button>
      <button class="cat-btn">🧢 Hats</button>
    </div>
  </nav>
</header>

<main class="main-content detail-main">
  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <button class="back-btn" onclick="history.back()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Go Back
    </button>
    <div class="utility-btns">
      <button class="util-btn" title="Info">ℹ️</button>
      <button class="util-btn" title="Copy Link" onclick="copyLink()">🔗</button>
      <button class="util-btn" title="Feedback">💬</button>
    </div>
  </div>

  <!-- Product Detail -->
  <div class="product-detail" id="productDetail">
    <!-- Loaded by JS -->
  </div>

  <!-- QC Preview Section -->
  <section class="qc-section" id="qcSection">
    <div class="section-header">
      <h3>QC Preview</h3>
      <a href="#" class="view-all">View All QC →</a>
    </div>
    <div class="qc-grid" id="qcGrid"></div>
  </section>

  <!-- More from Shop -->
  <section class="more-section" id="moreSection">
    <div class="section-header">
      <h3>More from this Shop</h3>
      <a href="#" class="view-all">View All →</a>
    </div>
    <div class="product-carousel" id="moreCarousel"></div>
  </section>

  <!-- You May Also Like -->
  <section class="more-section">
    <div class="section-header">
      <h3>You May Also Like</h3>
    </div>
    <div class="product-carousel" id="likeCarousel"></div>
  </section>
</main>

<!-- Image Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img src="" id="lightboxImg" alt="">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
</div>

<footer class="footer">
  <p>©2026 REPFIND Research Platform · For research purposes only</p>
</footer>

<script src="data.js"></script>
<script src="product.js"></script>
</body>
</html>
