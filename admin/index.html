<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supershop Admin - Manage Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #020617;
  --bg-secondary: #0f172a;
  --accent: #2563eb;
  --text-primary: #f8fafc;
}
body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; padding: 2rem; }
.admin-container { max-width: 1200px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
.back-home { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
table { width: 100%; border-collapse: collapse; background: var(--bg-secondary); border-radius: 1rem; overflow: hidden; margin-top: 2rem; }
th, td { padding: 1.25rem 1.5rem; text-align: left; border-bottom: 1px solid #1e293b; }
th { background: #1e293b; color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; font-weight: 700; }
.product-row:hover { background: #1e293b; }
.product-img { width: 48px; height: 48px; border-radius: 0.5rem; object-fit: cover; }
.action-btn { background: #ef4444; color: white; border: none; padding: 0.5rem 0.75rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
.add-form { background: var(--bg-secondary); padding: 2rem; border-radius: 1rem; border: 1px solid #1e293b; display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
.form-group { display: flex; flex-direction: column; gap: 0.5rem; }
input, select, textarea { background: #1e293b; border: 1px solid #334155; padding: 0.75rem; border-radius: 0.5rem; color: white; outline: none; }
.btn-submit { grid-column: span 2; background: var(--accent); color: white; padding: 1rem; border-radius: 0.5rem; font-weight: 700; font-size: 1rem; border: none; margin-top: 1rem; cursor: pointer; }
.btn-submit:hover { background: #3b82f6; }
</style>
</head>
<body>
<div class="admin-container">
  <div class="header">
    <span>Super<span class="logo-accent">shop</span> Admin</span>
    <a href="../index.html" class="back-home">← Back to Site</a>
  </div>

  <section>
    <h2>Add New Product</h2>
    <div class="add-form" id="productForm">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="title" placeholder="e.g. LV Skates">
      </div>
      <div class="form-group">
        <label>Brand</label>
        <input type="text" id="brand" placeholder="e.g. Louis Vuitton">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="category">
          <option value="shoes">Shoes</option>
          <option value="jackets">Jackets</option>
          <option value="pants">Pants</option>
          <option value="sets">Sets & Suits</option>
          <option value="hoodies">Hoodies</option>
          <option value="tshirts">T-Shirts</option>
          <option value="shorts">Shorts</option>
          <option value="bags">Bags</option>
          <option value="accessories">Accessories</option>
          <option value="electronics">Electronics</option>
          <option value="general">General</option>
        </select>
      </div>
      <div class="form-group">
        <label>Price ($)</label>
        <input type="number" id="price" placeholder="e.g. 53.00">
      </div>
      <div class="form-group" style="grid-column: span 2;">
        <label>Product Images (Upload or paste URLs)</label>
        <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
          <input type="text" id="imageInput" placeholder="Paste single URL and click Add" style="flex: 1;">
          <button type="button" onclick="addImageByUrl()" style="background: var(--accent); border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; color: white; cursor: pointer;">Add URL</button>
        </div>
        <div style="background: #1e293b; border: 2px dashed #334155; padding: 1.5rem; border-radius: 0.5rem; text-align: center; cursor: pointer; margin-bottom: 1rem;" 
             onclick="document.getElementById('localFile').click()">
          <span style="color: #94a3b8;">Click to upload local images</span>
          <input type="file" id="localFile" multiple accept="image/*" style="display: none;" onchange="handleLocalFiles(event)">
        </div>
        <div id="imageGallery" style="display: flex; flex-wrap: wrap; gap: 0.5rem;"></div>
      </div>
      <div class="form-group">
        <label>Product Link</label>
        <input type="text" id="link" placeholder="https://weidian.com/item.html?itemID=...">
      </div>
      <div class="form-group" style="grid-column: span 2;">
        <label>Description</label>
        <textarea id="description" rows="3"></textarea>
      </div>
      <div style="grid-column: span 2; display: flex; gap: 1rem;">
        <button id="submitBtn" class="btn-submit" onclick="addProduct()" style="flex: 3;">Add Product</button>
        <button id="cancelBtn" class="btn-submit" onclick="cancelEdit()" style="flex: 1; background: #475569; display: none;">Cancel</button>
      </div>
    </div>
  </section>

  <section style="margin-top: 3rem;">
    <h2>Bulk Import (JSON / CSV)</h2>
    <div style="background: var(--bg-secondary); padding: 1.5rem; border-radius: 1rem; border: 1px solid #1e293b;">
      <p style="color: #94a3b8; font-size: 0.85rem; margin-bottom: 1rem;">Paste JSON array or CSV text (Format: Title,Brand,Category,Price,ImageURL,Link). One product per line for CSV.</p>
      <textarea id="bulkData" rows="6" style="width: 100%; background: #020617; border: 1px solid #334155; border-radius: 0.5rem; color: white; padding: 1rem; font-family: monospace;"></textarea>
      <div style="display: flex; gap: 1rem; margin-top: 1rem;">
        <button class="action-btn" style="background: var(--accent); flex: 1; padding: 0.75rem;" onclick="processBulk('json')">Import as JSON</button>
        <button class="action-btn" style="background: #10b981; flex: 1; padding: 0.75rem;" onclick="processBulk('csv')">Import as CSV</button>
      </div>
    </div>
  </section>

  <section style="margin-top: 4rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap;">
      <h2 style="margin: 0;">Product Management</h2>
      <div style="display: flex; gap: 0.75rem; flex: 1; justify-content: flex-end; min-width: 300px;">
        <select id="adminCatFilter" onchange="filterInventory()" style="background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; color: #94a3b8; padding: 0.75rem; outline: none; font-weight: 600;">
          <option value="all">All Categories</option>
          <option value="shoes">Shoes</option>
          <option value="jackets">Jackets</option>
          <option value="pants">Pants</option>
          <option value="sets">Sets & Suits</option>
          <option value="hoodies">Hoodies</option>
          <option value="tshirts">T-Shirts</option>
          <option value="shorts">Shorts</option>
          <option value="bags">Bags</option>
          <option value="accessories">Accessories</option>
          <option value="electronics">Electronics</option>
        </select>
        <select id="adminBrandFilter" onchange="filterInventory()" style="background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; color: #94a3b8; padding: 0.75rem; outline: none; font-weight: 600; min-width: 140px;">
          <option value="all">All Brands</option>
        </select>
        <div style="position: relative; width: 260px;">
          <input type="text" id="adminSearch" placeholder="Quick search..." oninput="filterInventory()" 
                 style="width: 100%; padding: 0.75rem 1rem 0.75rem 2.75rem; background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; color: white; outline: none;">
          <svg style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #64748b;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
        </div>
      </div>
    </div>
    <table id="productTable">
      <thead>
        <tr>
          <th>Image</th>
          <th>Product</th>
          <th>Price</th>
          <th>Category</th>
          <th>Link</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="productBody"></tbody>
    </table>
  </section>
</div>

<script src="../data.js"></script>
<script>
const tbody = document.getElementById('productBody');

function fixImgPath(path) {
  if (!path) return '';
  if (path.startsWith('http') || path.startsWith('data:') || path.startsWith('../')) return path;
  return '../' + path;
}

function filterInventory() {
  const query = document.getElementById('adminSearch').value.toLowerCase();
  const cat = document.getElementById('adminCatFilter').value.toLowerCase();
  const brand = document.getElementById('adminBrandFilter').value.toLowerCase();
  const rows = document.querySelectorAll('.product-row');
  
  rows.forEach(row => {
    const titleText = row.cells[1].querySelector('div').innerText.toLowerCase();
    const brandText = row.cells[1].querySelector('div:last-child').innerText.toLowerCase();
    const catText = row.cells[3].innerText.toLowerCase();
    
    const matchesSearch = titleText.includes(query) || brandText.includes(query);
    const matchesCat = cat === 'all' || catText === cat;
    const matchesBrand = brand === 'all' || brandText === brand;
    
    row.style.display = (matchesSearch && matchesCat && matchesBrand) ? 'table-row' : 'none';
  });
}

function renderAdminProducts() {
  const products = getProducts();
  
  // Update Brands Dropdown
  const brands = [...new Set(products.map(p => p.brand))].sort();
  const brandFilter = document.getElementById('adminBrandFilter');
  const currentBrand = brandFilter.value;
  brandFilter.innerHTML = '<option value="all">All Brands</option>' + 
    brands.map(b => `<option value="${b.toLowerCase()}" ${currentBrand === b.toLowerCase() ? 'selected' : ''}>${b}</option>`).join('');

  tbody.innerHTML = products.map(p => {
    const imgPath = Array.isArray(p.images) ? p.images[0] : p.image;
    return `
    <tr class="product-row">
      <td><img src="${fixImgPath(imgPath)}" class="product-img"></td>
      <td>
        <div style="font-weight: 700; color: white;">${p.title}</div>
        <div style="font-size: 0.85rem; color: #94a3b8;">${p.brand}</div>
      </td>
      <td style="font-weight: 600; color: #60a5fa;">$${p.price.toFixed(2)}</td>
      <td><span style="background: rgba(37, 99, 235, 0.2); color: #3b82f6; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600;">${p.category}</span></td>
      <td><a href="${p.link || '#'}" target="_blank" style="color: #60a5fa; text-decoration: none; font-size: 0.85rem;" title="${p.link || 'No Link'}">View Link</a></td>
      <td>
        <div style="display: flex; gap: 0.5rem;">
          <button class="action-btn" style="background: var(--accent);" onclick="startEdit(${p.id})">Edit</button>
          <button class="action-btn" onclick="deleteProduct(${p.id})">Delete</button>
        </div>
      </td>
    </tr>
  `;}).reverse().join('');
}

 let currentImages = [];

function addImageByUrl() {
  const url = document.getElementById('imageInput').value.trim();
  if (url) {
    currentImages.push(url);
    document.getElementById('imageInput').value = '';
    renderGallery();
  }
}

function handleLocalFiles(e) {
  const files = e.target.files;
  for (let file of files) {
    const reader = new FileReader();
    reader.onload = (event) => {
      currentImages.push(event.target.result); // Base64
      renderGallery();
    };
    reader.readAsDataURL(file);
  }
}

function removeImage(index) {
  currentImages.splice(index, 1);
  renderGallery();
}

function renderGallery() {
  const gallery = document.getElementById('imageGallery');
  gallery.innerHTML = currentImages.map((img, i) => `
    <div style="position: relative; width: 80px; height: 80px;">
      <img src="${fixImgPath(img)}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 0.5rem; border: 1px solid #334155;">
      <button onclick="removeImage(${i})" style="position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border: none; width: 20px; height: 20px; border-radius: 50%; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;">✕</button>
    </div>
  `).join('');
}

function addProduct() {
  const editId = document.getElementById('editId').value;
  const title = document.getElementById('title').value;
  const brand = document.getElementById('brand').value;
  const category = document.getElementById('category').value;
  const price = parseFloat(document.getElementById('price').value);
  const link = document.getElementById('link').value || '#';
  const description = document.getElementById('description').value;

  if (!title || !price || currentImages.length === 0) {
    alert("Please fill in Title, Price, and at least one Image");
    return;
  }

  const products = getProducts();
  
  if (editId) {
    // Update existing
    const index = products.findIndex(p => p.id == editId);
    if (index !== -1) {
      products[index] = {
        ...products[index],
        title, brand, category, price, images: [...currentImages], image: currentImages[0], link, description
      };
      alert("Product updated successfully!");
    }
  } else {
    // Add new
    const newProduct = {
      id: Date.now(),
      title, brand, category, price, images: [...currentImages], image: currentImages[0], link, description
    };
    products.push(newProduct);
    alert("Product added successfully!");
  }

  saveProducts(products);
  cancelEdit(); // Reset form and state
  renderAdminProducts();
}

function startEdit(id) {
  const products = getProducts();
  const p = products.find(prod => prod.id == id);
  if (!p) return;

  document.getElementById('editId').value = p.id;
  document.getElementById('title').value = p.title;
  document.getElementById('brand').value = p.brand;
  document.getElementById('category').value = p.category;
  document.getElementById('price').value = p.price;
  document.getElementById('link').value = p.link || '';
  document.getElementById('description').value = p.description || '';

  // Load images
  currentImages = Array.isArray(p.images) ? [...p.images] : (p.image ? [p.image] : []);
  renderGallery();

  document.getElementById('submitBtn').textContent = "Update Product";
  document.getElementById('cancelBtn').style.display = "block";
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() {
  document.getElementById('editId').value = '';
  document.getElementById('title').value = '';
  document.getElementById('brand').value = '';
  document.getElementById('price').value = '';
  document.getElementById('link').value = '';
  document.getElementById('description').value = '';
  currentImages = [];
  renderGallery();
  
  document.getElementById('submitBtn').textContent = "Add Product";
  document.getElementById('cancelBtn').style.display = "none";
}

function processBulk(type) {
  const raw = document.getElementById('bulkData').value.trim();
  if (!raw) return alert("Please paste some data first.");

  let newItems = [];
  const existing = getProducts();

  if (type === 'json') {
    try {
      newItems = JSON.parse(raw).map(item => ({
        id: Date.now() + Math.random(),
        title: item.title,
        brand: item.brand || 'other',
        category: item.category || 'other',
        price: parseFloat(item.price) || 0,
        images: Array.isArray(item.images) ? item.images : [item.image || ''],
        image: Array.isArray(item.images) ? item.images[0] : (item.image || ''),
        link: item.link || '#',
        description: item.description || ''
      }));
    } catch(e) { return alert("Invalid JSON format."); }
  } else {
    // CSV logic: Title, Brand, Category, Price, ImageURL
    const lines = raw.split('\n');
    lines.forEach(line => {
      const parts = line.split(',');
      if (parts.length >= 4) {
        newItems.push({
          id: Date.now() + Math.random(),
          title: parts[0].trim(),
          brand: parts[1].trim(),
          category: parts[2].trim(),
          price: parseFloat(parts[3]) || 0,
          images: [(parts[4] || '').trim()],
          image: (parts[4] || '').trim(),
          link: (parts[5] || '#').trim(),
          description: ''
        });
      }
    });
  }

  if (newItems.length > 0) {
    saveProducts([...existing, ...newItems]);
    document.getElementById('bulkData').value = '';
    renderAdminProducts();
    alert(`Successfully imported ${newItems.length} products!`);
  }
}

function deleteProduct(id) {
  if (confirm("Are you sure you want to delete this product?")) {
    const products = getProducts();
    const filtered = products.filter(p => p.id !== id);
    saveProducts(filtered);
    renderAdminProducts();
  }
}

document.addEventListener('DOMContentLoaded', renderAdminProducts);
</script>
</body>
</html>
