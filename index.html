<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supershop - Premium Global Sourcing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-top">
    <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span>Super<span class="logo-accent">shop</span></span>
    </div>
    <div class="search-bar">
      <svg class="search-ic" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Search products, brands..." id="searchInput" oninput="handleSearch()">
    </div>
    <div class="header-nav">
      <a href="https://discord.gg/uWSUcQExcg" target="_blank" class="nav-icon-btn" title="Join our Discord" style="display: flex; align-items: center; color: #5865F2;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.666 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42.001 1.333-.956 2.419-2.157 2.419z"/>
        </svg>
      </a>
    </div>
  </div>
  <!-- Category Nav -->
  <nav class="cat-nav">

    <button class="cat-scroll-btn cat-scroll-prev" id="catPrev" onclick="scrollCats(-250)" style="display: none;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>

    <div class="cats" id="catBar" onscroll="updateScrollBtns()">
      <a class="cat-link" onclick="setCategory('all',this)">All Categories</a>
      <a class="cat-link active" onclick="setCategory('shoes',this)">Shoes</a>
      <a class="cat-link" onclick="setCategory('tshirts',this)">T-Shirts</a>
      <a class="cat-link" onclick="setCategory('shorts',this)">Shorts</a>
      <a class="cat-link" onclick="setCategory('jerseys',this)">Jerseys</a>
      <a class="cat-link" onclick="setCategory('sets',this)">Sets & Suits</a>
      <a class="cat-link" onclick="setCategory('hoodies',this)">Hoodies</a>
      <a class="cat-link" onclick="setCategory('pants',this)">Pants</a>
      <a class="cat-link" onclick="setCategory('accessories',this)">Accessories</a>
      <a class="cat-link" onclick="setCategory('hats',this)">Hats</a>
      <a class="cat-link" onclick="setCategory('bags',this)">Bags</a>
      <a class="cat-link" onclick="setCategory('jackets',this)">Jackets</a>
      <a class="cat-link" onclick="setCategory('electronics',this)">Electronics</a>
    </div>

    <button class="cat-scroll-btn cat-scroll-next" id="catNext" onclick="scrollCats(250)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    
    <div style="display: flex; align-items: center; gap: 1.5rem; margin-left: auto; padding-left: 2rem;">
      <div class="brands-dropdown-container" style="position: relative;">
        <button class="cat-link" style="display: flex; align-items: center; gap: 6px; font-weight: 700; color: var(--accent); white-space: nowrap; height: 100%;" onclick="document.getElementById('brandsDropdownMenu').style.display = document.getElementById('brandsDropdownMenu').style.display === 'flex' ? 'none' : 'flex'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 6 7 1-5 5 1 7-6-4-6 4 1-7-5-5 7-1z"/></svg>
          Brands ▾
        </button>
        <div id="brandsDropdownMenu" style="display: none; position: absolute; top: calc(100% + 10px); right: 0; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(12px); border: 1px solid var(--border-color); border-radius: 0.75rem; padding: 0.5rem; width: 180px; max-height: 400px; overflow-y: auto; scrollbar-width: thin; z-index: 1000; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); flex-direction: column; gap: 2px;">
          <a class="cat-link brand-link active" style="padding: 0.5rem 0.75rem; border-radius: 0.5rem; border-bottom: none; display: block; text-align: left;" onclick="setBrand('all',this); document.getElementById('brandsDropdownMenu').style.display='none'">All Brands</a>
        </div>
      </div>
    </div>
  </nav>
</header>



<!-- MAIN -->
<main class="main">
  <div class="page-hero">
    <h1 class="page-title" id="pageTitle">Shoes</h1>
  </div>

  <div class="products-grid" id="productsGrid"></div>
  <div class="no-results" id="noResults" style="display:none">
    <p>No products found. Try adjusting your filters.</p>
  </div>
  <div class="load-more-wrap" id="loadMoreWrap">
    <button class="btn-load-more" onclick="loadMore()">Load More</button>
  </div>
</main>

<!-- SCROLL TO TOP -->
<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
</button>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="product-modal" id="productModal">
    <button class="modal-close-btn" onclick="closeModal()">✕</button>
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>

<footer class="footer">
  <p>&copy;2026 Supershop &middot; Premium Global Sourcing Platform &middot; Professional Solutions</p>
</footer>

<script src="data.js?v=59"></script>
<script src="app.js?v=59"></script>

</body>
</html>
